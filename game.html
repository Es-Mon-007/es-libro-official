<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GAME | Es-Libro</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>GAME</h1>

<p>Play. Stream. Connect.</p>

</header>

<main>

<section class="game-section">

<h2>🎮 LIVE STATUS</h2>

<div id="live-status">

<p>読み込み中...</p>

</div>

<a id="watchLive"
href="https://www.youtube.com/@eslibro4930"
target="_blank"
class="game-btn">

WATCH LIVE

</a>

</section>

<section class="game-section">

<h2>📅 NEXT STREAM</h2>

<p>Coming Soon...</p>

</section>

<section class="game-section">

<h2>🎥 LATEST ARCHIVES</h2>

<p>（次回ここに自動表示します）</p>

</section>

<section class="game-section">

<h2>🕹 PLAYING GAMES</h2>

<ul>

<li>鉄拳8</li>

<li>VALORANT</li>

<li>Minecraft</li>

<li>Apex Legends</li>

</ul>

</section>

</main>

<script>

async function loadLiveStatus(){

try{

const res = await fetch("/api/youtube");

const data = await res.json();

const status = document.getElementById("live-status");

const button = document.getElementById("watchLive");

if(data.live){

status.innerHTML=`
<h2 style="color:#00ff66;">
🟢 LIVE NOW
</h2>

<p>${data.title}</p>
`;

button.href=`https://youtube.com/watch?v=${data.videoId}`;

}else{

status.innerHTML=`
<h2 style="color:#888;">
⚪ OFFLINE
</h2>

<p>
現在ライブ配信は行っていません。
</p>
`;

button.href="https://www.youtube.com/@eslibro4930";

}

}catch(e){

document.getElementById("live-status").innerHTML=`
<p>取得に失敗しました。</p>
`;

}

}

loadLiveStatus();

setInterval(loadLiveStatus,60000);

</script>

</body>

</html>
