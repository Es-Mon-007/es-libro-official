<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GAME | Es-Libro</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>GAME</h1>

<p>Play. Stream. Connect.</p>

</header>

<main>

  <section id="livePlayerSection" class="live-player-section" style="display:none;">

<h2>🟢 NOW LIVE</h2>

<div class="player-wrapper">

<iframe
id="livePlayer"
width="100%"
height="600"
src=""
title="YouTube Live"
frameborder="0"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
allowfullscreen>

</iframe>

</div>

</section>
<section class="game-section">

<h2>🎮 LIVE STATUS</h2>

<div id="live-status">

<p>読み込み中...</p>

</div>

<a id="watchLive"
href="https://www.youtube.com/@eslibro4930"
target="_blank"
class="game-btn">

WATCH LIVE

</a>

</section>

<section class="game-section">

<h2>📅 NEXT STREAM</h2>

<p>Coming Soon...</p>

</section>

<section class="game-section">

<h2>🎥 LATEST ARCHIVES</h2>

<div id="archives">

読み込み中...

</div>

</section>

<section class="game-section">

<h2>🕹 PLAYING GAMES</h2>

<ul>

<li>鉄拳8</li>

<li>ホグワーツレガシー</li>

<li>Call of Duty</li>

<li>Apex Legends</li>

</ul>

</section>

</main>

<script>

async function loadLiveStatus(){

try{

const res = await fetch("/api/youtube");

const data = await res.json();

const status = document.getElementById("live-status");

const button = document.getElementById("watchLive");

if(data.live){

status.innerHTML=`
<h2 style="color:#00ff66;">
🟢 LIVE NOW
</h2>

<p>${data.liveVideo.title}</p>
`;

button.href=`https://youtube.com/watch?v=${data.liveVideo.videoId}`;

// ライブプレイヤー表示
const section = document.getElementById("livePlayerSection");
const player = document.getElementById("livePlayer");

section.style.display = "block";

player.src =
`https://www.youtube.com/embed/${data.liveVideo.videoId}`;

}else{

status.innerHTML=`
<h2 style="color:#888;">
⚪ OFFLINE
</h2>

<p>
現在ライブ配信は行っていません。
</p>
`;

button.href="https://www.youtube.com/@eslibro4930";

// プレイヤー非表示
document.getElementById("livePlayerSection").style.display="none";
document.getElementById("livePlayer").src="";

}

status.innerHTML=`
<h2 style="color:#888;">
⚪ OFFLINE
</h2>

<p>
現在ライブ配信は行っていません。
</p>
`;

button.href="https://www.youtube.com/@eslibro4930";

}

}catch(e){

document.getElementById("live-status").innerHTML=`
<p>取得に失敗しました。</p>
`;

}

}

loadLiveStatus();

  async function loadArchives(){

const res = await fetch("/api/youtube");

const data = await res.json();

const area=document.getElementById("archives");

area.innerHTML="";

data.archives.forEach(video=>{

area.innerHTML+=`

<div class="archive-card">

<img src="${video.thumbnail}">

<div class="archive-info">

<h3>${video.title}</h3>

<p>${video.date}</p>

<a href="https://youtube.com/watch?v=${video.videoId}" target="_blank">

WATCH

</a>

</div>

</div>

`;

});

}

loadArchives();

setInterval(()=>{
    loadLiveStatus();
    loadArchives();
},60000);
</script>

</body>

</html>
